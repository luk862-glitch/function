<!doctype html>
<html>
<head>
    <title>Katie's Function Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="assets/style.css" rel="stylesheet">
    <script src="assets/main.js" defer></script>
</head>

<body>
    <h1>Conversation Prompt Generator</h1>
    <p>A reflection and conversation generator for international students and newcomers in NYC. Choose a mode, group size, and topic to get questions tailored to your solo or social moments—whether light and playful, reflective, or more personal.</p>

    <form id="some-form">

    <section>
        <label for="mode">Mode</label>
        <select id="mode" name="mode">
            <option>Select</option>
            <option>Playful</option>
            <option>Reflective</option>
            <option>Intimate</option>
        </select>
    </section>

    <section>
        <label for="number">Number of people</label>
        <select id="number" name="number">
            <option>Select</option>
            <option>1</option>
            <option>2</option>
            <option>3-5</option>
            <option>6+</option>
        </select>
    </section>

    <section>
        <label for="topic">Topic</label>
        <select id="topic" name="topic">
            <option>All</option>
            <option>Relationship</option>
            <option>Work</option>
            <option>Family</option>
            <option>Growth</option>
            <option>Everyday Life</option>
        </select>
    </section>

    <div>
    <button type="submit">Generate</button>
    </div>

    </form>


    <ul id="convo-prompts"></ul>


    <!-- <div>
    <button id="next">Next</button>
    </div> -->

</body>
</html>
