<!doctype html>
<html>
<head>
    <title>Katie's Function Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="assets/reset.css" rel="stylesheet">
    <link href="assets/style.css" rel="stylesheet">
    <script src="assets/main.js" defer></script>
</head>

<body>
    <!-- page 1 -->
    <header id="page-1">
        <h1 class="title">Spark</h1>
        <h2>Skip the small talk. Pick a vibe, who you're with, and a topic. Get questions that help you connect — with others or with yourself.</p>
        <button class="button button-primary" id="start-button">Let's get started</button>
            <figure>
                <img src="assets/solo-intro.png" alt="Solo">
                <img src="assets/duo-intro.png" alt="Duo">
                <img src="assets/s-group-intro.png" alt="Small group">
                <img src="assets/l-group-intro.png" alt="Large group">
            </figure>
    </header>

    <!-- page 2 -->
    <form id="some-form" class="hidden">

    <section>
        <fieldset>
            <legend>Mode</legend>

            <label class="setting-option">
                <input type="radio" name="mode" value="Playful" checked>
                <span>Playful</span>
            </label>

            <label class="setting-option">
                <input type="radio" name="mode" value="Reflective">
                <span>Reflective</span>
            </label>

            <label class="setting-option">
                <input type="radio" name="mode" value="Intimate">
                <span>Intimate</span>
            </label>
        </fieldset>
    </section>

    <section class="form-divider">
        <fieldset>
            <legend>Setting</legend>

                <label class="setting-option">
                    <input type="radio" name="setting" value="Solo" checked>
                    <img src="assets/solo.png" alt="Solo">
                    <span>Solo</span>
                </label>

                <label class="setting-option">
                    <input type="radio" name="setting" value="Duo">
                    <img src="assets/duo.png" alt="Duo">
                    <span>Duo</span>
                </label>

                <label class="setting-option">
                    <input type="radio" name="setting" value="Small Group (3-5)">
                    <img src="assets/s-group.png" alt="Small group">
                    <span>Small Group (3-5)</span>
                </label>

                <label class="setting-option">
                    <input type="radio" name="setting" value="Large Group (6+)">
                    <img src="assets/l-group.png" alt="Large group">
                    <span>Large Group (6+)</span>
                </label>
        </fieldset>
    </section>

    <section class="form-divider">
        <fieldset>
            <legend>Topic</legend>

                <label class="setting-option">
                    <input type="radio" name="topic" value="All" checked>
                    <span>All</span>
                </label>

                <label class="setting-option">
                    <input type="radio" name="topic" value="Relationship">
                    <span>Relationship</span>
                </label>

                <label class="setting-option">
                    <input type="radio" name="topic" value="Work">
                    <span>Work</span>
                </label>

                <label class="setting-option">
                    <input type="radio" name="topic" value="Family">
                    <span>Family</span>
                </label>

                <label class="setting-option">
                    <input type="radio" name="topic" value="Growth">
                    <span>Growth</span>
                </label>

                <label class="setting-option">
                    <input type="radio" name="topic" value="Everyday life">
                    <span>Everyday Life</span>
                </label>
        </fieldset>
    </section>

    <button type="submit" class="button button-primary generate-button">Generate</button>
</form>

        <!-- page 3 -->
    <section id="page-3"class="full-section hidden">
        <button class="button button-secondary" id="back-button">← Back</button>
            <button id="modal" class="button button-secondary saved-questions">View saved ♥︎</button>
                <dialog id="dialog">
                    <ul id="saved-list"></ul>
                    <button class="button button-secondary close-button">Close</button>
                </dialog>

        <ul id="convo-prompts"></ul>
    </section>

</body>
</html>
