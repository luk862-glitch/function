<head>
    <title>Katie's Function Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

<body>
    <header>
        <h1>Conversation Prompt Generator</h1>
        <h2>A reflection and conversation generator for international students and newcomers in NYC. Choose a mode, group size, and topic to get questions tailored to your solo or social moments—whether light and playful, reflective, or more personal.</p>
        <button id="start-button">Let's get started</button>
    </header>

    <form id="some-form">

    <section>
        <label for="mode">Mode</label>
        <select id="mode" name="mode">
            <option>Select</option>
            <option>Playful</option>
            <option>Reflective</option>
            <option>Intimate</option>
        </select>
    </section>

<section>
    <fieldset>
    <legend>Setting</legend>

    <label class="setting-option">
        <input type="radio" name="setting" value="Solo" checked>
        <img src="assets/solo.png" alt="Solo">
        <span>Solo</span>
    </label>

    <label class="setting-option">
        <input type="radio" name="setting" value="Duo">
        <img src="assets/duo.png" alt="Duo">
        <span>Duo</span>
    </label>

    <label class="setting-option">
        <input type="radio" name="setting" value="Small Group (3-5)">
        <img src="assets/s-group.png" alt="Small group">
        <span>Small Group (3-5)</span>
    </label>

    <label class="setting-option">
        <input type="radio" name="setting" value="Large Group (6+)">
        <img src="assets/l-group.png" alt="Large group">
        <span>Large Group (6+)</span>
    </label>

    </fieldset>
</section>


    <section>
        <label for="topic">Topic</label>
        <select id="topic" name="topic">
            <option>All</option>
            <option>Relationship</option>
            <option>Work</option>
            <option>Family</option>
            <option>Growth</option>
        </select>
    </section>

    <button type="submit" class="generate-button">Generate</button>
    </form>

    <li>
        <button id="modal" class="saved-questions">View saved ♥︎</button>
		<dialog id="dialog">
            <ul id="saved-list"></ul>
			<button class="close-button">Close</button>
	</dialog>
    </li>

    <ul id="convo-prompts"></ul>
    

</body>
</html>
